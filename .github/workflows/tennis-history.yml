name: Update Tennis History

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tennis-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer les dépendances
        run: pip install requests --break-system-packages -q

      - name: Reconstruire les profils statistiques
        run: python scripts/update_tennis_data.py history

      - name: Vérifier le JSON
        run: python scripts/validate_tennis_data.py tennis-history.json

      - name: Publier si les données ont changé
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tennis-history.json
          git diff --staged --quiet || git commit -m "📊 Historique tennis $(date -u +'%Y-%m-%d')"
          git push
