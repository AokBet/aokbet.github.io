name: Update Tennis Scores

on:
  schedule:
    - cron: '*/5 * * * *'   # toutes les 5 minutes
  workflow_dispatch:          # déclenchement manuel possible

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Sofascore
        run: |
          DATE=$(date -u +%Y-%m-%d)
          HTTP=$(curl -s -o tennis-live.json -w "%{http_code}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://api.sofascore.com/api/v1/sport/tennis/scheduled-events/$DATE")
          echo "Sofascore status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "Fetch failed — fichier existant conservé"
            exit 0
          fi
          COUNT=$(python3 -c "import sys,json; d=json.load(open('tennis-live.json')); print(len(d.get('events',[])))" 2>/dev/null || echo "?")
          echo "$COUNT matchs récupérés"

      - name: Commit si modifié
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tennis-live.json
          git diff --staged --quiet || git commit -m "🎾 Scores $(date -u +'%H:%M UTC')"
          git push
