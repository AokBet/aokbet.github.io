name: Update Tennis Scores

on:
  schedule:
    - cron: '*/5 * * * *'   # toutes les 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer les dépendances
        run: pip install beautifulsoup4 lxml requests --break-system-packages -q

      - name: Scraper livescores.com
        run: |
          python3 << 'PYEOF'
          import requests, json, re, sys
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone

          # livescores.com est rendu côté serveur (SSR) — les données sont dans le HTML brut.
          # Couvre : ATP 250/500/1000, WTA 250/500/1000, Challengers, Grand Chelems.

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) '
                            'AppleWebKit/537.36 (KHTML, like Gecko) '
                            'Chrome/124.0.0.0 Safari/537.36',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              'Accept-Language': 'en-US,en;q=0.9',
              'Cache-Control': 'no-cache',
              'Referer': 'https://www.google.com/',
          }

          def cap(slug):
              return ' '.join(w.capitalize() for w in slug.split('-') if w)

          from datetime import timedelta
          tomorrow = (datetime.now(timezone.utc) + timedelta(days=1)).strftime('%Y-%m-%d')

          urls_to_fetch = [
              'https://www.livescores.com/tennis/',                        # aujourd'hui
              f'https://www.livescores.com/tennis/?d={tomorrow}',          # demain (format ?d=)
              f'https://www.livescores.com/tennis/{tomorrow}/',            # demain (format /date/)
          ]

          all_html = []
          for url in urls_to_fetch:
              try:
                  r = requests.get(url, headers=HEADERS, timeout=25)
                  r.raise_for_status()
                  print(f"Fetch OK {url} — {len(r.text)} octets", file=sys.stderr)
                  if '-vs-' in r.text:
                      all_html.append(r.text)
              except Exception as e:
                  print(f"Fetch error {url}: {e}", file=sys.stderr)

          if not all_html:
              print("Aucune source disponible", file=sys.stderr)
              sys.exit(0)

          events = []
          seen = set()

          # Combiner tous les HTML (aujourd'hui + demain) et parser en une passe
          combined = '\n'.join(all_html)
          soup = BeautifulSoup(combined, 'lxml')

          for link in soup.find_all('a', href=True):
              href = link['href']
              m = re.match(
                  r'^/tennis/([^/]+)/([^/]+)/(.+)-vs-(.+)/(\d{5,8})/?$',
                  href
              )
              if not m:
                  continue
              cat, tourn, p1s, p2s, mid = m.groups()
              if mid in seen:
                  continue
              seen.add(mid)

              tour = 'WTA' if cat.startswith('wta') else 'ATP'
              tournament = cap(tourn)
              p1_name = cap(p1s)
              p2_name = cap(p2s)

              raw = link.get_text(strip=True)

              if re.search(r'Canc\.|Retired|W\.O\.', raw, re.I):
                  continue

              # ── Statut ────────────────────────────────────────────────
              # livescores.com : "FT" = terminé (peut être collé : "FTNuno...")
              # Heure seule (ex : "21:00") = programmé. Sinon = en cours.
              first_child_text = ''
              for child in link.children:
                  t = child.get_text(strip=True) if hasattr(child, 'get_text') else str(child).strip()
                  if t:
                      first_child_text = t
                      break

              if first_child_text == 'FT' or raw.startswith('FT'):
                  status = 'finished'
              elif re.match(r'^\d{1,2}:\d{2}$', first_child_text):
                  status = 'scheduled'
              else:
                  status = 'live'

              # ── Scores ────────────────────────────────────────────────
              # Méthode 1 : éléments feuilles avec 1-2 chiffres
              nums = []
              for el in link.find_all(True):
                  if not el.find():
                      t = el.get_text(strip=True)
                      if re.match(r'^\d{1,2}$', t):
                          nums.append(int(t))

              # Méthode 2 (fallback) : livescores colle les scores en un bloc
              # ex: "FTNuno BorgesTerence Atmane6644" → digits = [6,6,4,4]
              if not nums and status != 'scheduled':
                  full = link.get_text()
                  # Supprimer le préfixe de statut et les heures
                  full = re.sub(r'^(FT|Live|Fin\.?|Int\.)\s*', '', full.strip(), flags=re.I)
                  full = re.sub(r'\d{1,2}:\d{2}', '', full)
                  # Ne garder que les chiffres, prendre chaque chiffre séparément
                  digits_str = re.sub(r'[^0-9]', '', full)
                  nums = [int(d) for d in digits_str]

              # livescores groupe par joueur : [p1_s1, p1_s2, ..., p2_s1, p2_s2, ...]
              if len(nums) % 2 != 0:
                  nums = nums[:-1]  # retirer le dernier si impair (tiebreak)
              half = len(nums) // 2
              p1_sets = nums[:half][:5]
              p2_sets = nums[half:half+5]

              p1_won = sum(1 for a, b in zip(p1_sets, p2_sets) if a > b)
              p2_won = sum(1 for a, b in zip(p1_sets, p2_sets) if b > a)

              if status == 'finished':
                  time_info = 'Termine'
              elif status == 'live':
                  time_info = 'En cours'
              else:
                  hm = re.search(r'(\d{1,2}:\d{2})', raw)
                  time_info = hm.group(1) if hm else ''

              events.append({
                  'id': mid,
                  'tour': tour,
                  'tournament': tournament,
                  'status': status,
                  'round': '',
                  'timeInfo': time_info,
                  'p1': {
                      'name': p1_name, 'cc': '', 'serving': False,
                      'sets': p1_sets, 'setsWon': p1_won, 'game': '',
                      'win': status == 'finished' and p1_won > p2_won,
                  },
                  'p2': {
                      'name': p2_name, 'cc': '', 'serving': False,
                      'sets': p2_sets, 'setsWon': p2_won, 'game': '',
                      'win': status == 'finished' and p2_won > p1_won,
                  },
              })

          output = {
              'source': 'livescores',
              'updatedAt': datetime.now(timezone.utc).isoformat(),
              'events': events,
          }

          with open('tennis-live.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False)

          print(f"OK: {len(events)} matchs ecrits dans tennis-live.json")
          if events:
              s = events[0]
              print(f"   Exemple : {s['p1']['name']} vs {s['p2']['name']} [{s['tournament']}] {s['status']}")
          PYEOF

      - name: Commit si modifié
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tennis-live.json
          git diff --staged --quiet || git commit -m "🎾 Scores $(date -u +'%H:%M UTC')"
          git push
